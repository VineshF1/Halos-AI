name: Update F1 Data

on:
  schedule:
    # Every Tuesday at 08:00 UTC (after Monday race weekends)
    - cron: "0 8 * * 2"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Ingest current season to Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          YEAR=$(date +%Y)
          python sql_ingestion.py --seasons $YEAR
